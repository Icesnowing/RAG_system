<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 知识库系统 - 登录</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">&#128218;</div>
                <h1>RAG 知识库系统</h1>
                <p>基于本地文档的智能问答</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>
                <div id="loginError" class="error-msg" style="display:none;"></div>
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">登 录</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');
            btn.disabled = true;
            btn.textContent = '登录中...';
            errorDiv.style.display = 'none';

            try {
                const formData = new FormData();
                formData.append('username', document.getElementById('username').value);
                formData.append('password', document.getElementById('password').value);

                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });

                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detail || '登录失败');

                localStorage.setItem('access_token', data.access_token);
                window.location.href = '/app';
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        });
    </script>
</body>
</html>
